appId: io.inits.amapin
productName: amapin
directories:
  output: release
# electron-builder generates the per-platform .icns/.ico from this single
# source PNG (needs to be at least 512x512 - public/logo.png is 2000x2000).
icon: public/logo.png
files:
  - electron/**/*
  - server/**/*
  - dist/amapin/browser/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: resources/bin
    to: bin
asarUnpack:
  - node_modules/ffmpeg-static/**
publish: null
# Explicit: guarantees no attempt to sign with a real Developer ID certificate
# (which costs money) or notarize. scripts/afterSign.cjs still applies a free
# ad-hoc signature afterwards - required for Apple Silicon to run the binary
# at all, see that file for why. (afterSign only runs for the mac target.)
afterSign: scripts/afterSign.cjs
mac:
  target: dmg
  category: public.app-category.utilities
  identity: null
  hardenedRuntime: false
  # Version-less filename so the landing page's GitHub "latest" download link
  # (see src/app/core/downloads.config.ts) never needs updating per release.
  artifactName: 'amapin-mac.${ext}'
win:
  target: nsis
  artifactName: 'amapin-win.${ext}'
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target: AppImage
  artifactName: 'amapin-linux.${ext}'
