<div class="ad-slot" [attr.aria-hidden]="shouldLoadAd() ? null : 'true'">
  @if (shouldLoadAd()) {
    <ins
      class="adsbygoogle"
      style="display:block; width:100%; height:100%"
      [attr.data-ad-client]="adSenseClientId"
      [attr.data-ad-slot]="adUnitId()"
      data-ad-format="auto"
      data-full-width-responsive="true"
    ></ins>
  } @else {
    <span class="ad-slot__placeholder">Anzeigenplatz</span>
  }
</div>
