@switch (platform()) {

      <rect width="24" height="24" rx="6" fill="#FF0000" />
      <path d="M9 7.5v9l8-4.5-8-4.5Z" fill="#fff" />
    </svg>
  }
  @case ('facebook') {
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect width="24" height="24" rx="6" fill="#1877F2" />
      <path
        d="M14.5 8.5h-1.6c-.5 0-.9.4-.9 1v1.4H14l-.3 2h-1.7V17h-2v-4.1H8.5v-2H10V9.2c0-1.6 1-2.7 2.6-2.7h1.9v2Z"
        fill="#fff"
      />

  @case ('instagram') {
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <defs>
        <linearGradient id="ig-grad" x1="0" y1="24" x2="24" y2="0">
          <stop offset="0" stop-color="#FEDA75" />

          <stop offset="1" stop-color="#4F5BD5" />
        </linearGradient>
      </defs>
      <rect width="24" height="24" rx="6" fill="url(#ig-grad)" />
      <rect x="7" y="7" width="10" height="10" rx="3" fill="none" stroke="#fff" stroke-width="1.5" />
      <circle cx="12" cy="12" r="2.4" fill="none" stroke="#fff" stroke-width="1.5" />
      <circle cx="15.3" cy="8.7" r="0.6" fill="#fff" />
    </svg>
  }
  @case ('tiktok') {
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect width="24" height="24" rx="6" fill="#000" />
      <path
        d="M14.5 6.5c.3 1.4 1.3 2.3 2.7 2.5v1.8c-.9 0-1.8-.3-2.6-.8v4.1a3.6 3.6 0 1 1-3.1-3.6v1.8a1.8 1.8 0 1 0 1.3 1.7V6.5h1.7Z"
        fill="#fff"
      />

  }
}
