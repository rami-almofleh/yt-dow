@if (consent.bannerOpen()) {
  <div class="consent-banner" role="region" [attr.aria-label]="t('consentBanner.ariaLabel')" *transloco="let t">
    <div class="consent-banner__content">
      <h2 class="consent-banner__title">{{ t('consentBanner.title') }}</h2>
      <p>
        {{ t('consentBanner.bodyIntro') }}
        <a routerLink="/datenschutz">{{ t('consentBanner.privacyLinkText') }}</a
        >{{ t('consentBanner.bodyOutro') }}
      </p>
    </div>

    <div class="consent-banner__actions">
      <button mat-button type="button" (click)="consent.deny()">{{ t('consentBanner.deny') }}</button>
      <button mat-flat-button color="primary" type="button" (click)="consent.grant()">
        {{ t('consentBanner.acceptAll') }}
      </button>
    </div>
  </div>
}
