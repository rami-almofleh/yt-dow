@if (history.entries().length > 0) {
  <section class="history" *transloco="let t">
    <div class="history__header">
      <h3>{{ t('downloadHistory.title') }}</h3>
      <button mat-button type="button" (click)="history.clear()">{{ t('downloadHistory.clear') }}</button>
    </div>

    <ul class="history__list">
      @for (entry of history.entries(); track entry.id) {
        <li class="history__item">
          <app-platform-icon [platform]="entry.platform" />

          <div class="history__info">
            <p class="history__title">{{ entry.title }}</p>
            <p class="history__meta">{{ formatLabel(entry) }} · {{ relativeTime(entry.downloadedAt) }}</p>
          </div>

          <button
            mat-icon-button
            type="button"
            [attr.aria-label]="t('downloadHistory.redownloadAriaLabel', { title: entry.title })"
            [disabled]="downloadService.isDownloading()"
            (click)="redownload(entry)"
          >
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
              <path
                d="M12 3v10m0 0-4-4m4 4 4-4M5 19h14"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </li>
      }
    </ul>
  </section>
}
