<ng-container *transloco="let t">
  <a class="skip-link" href="#main-content">{{ t('shell.skipLink') }}</a>

  <div class="shell">
    <header class="shell__header">
      <div class="shell__header-inner">
        <a routerLink="/" class="brand">
          <img class="brand__mark" src="logo.png" width="28" height="28" alt="" />
          <span class="brand__name">Reelio</span>
        </a>

        <div class="shell__header-actions">
          <button
            mat-icon-button
            type="button"
            class="lang-toggle"
            [attr.aria-label]="t('shell.languageSwitcher.label')"
            [matMenuTriggerFor]="langMenu"
          >
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path
                d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.93 6h-2.95a15.7 15.7 0 00-1.38-3.56A8.03 8.03 0 0118.93 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14a8.1 8.1 0 010-4h3.38a16.5 16.5 0 000 4H4.26zm.81 2h2.95A15.7 15.7 0 009.4 19.56 8.03 8.03 0 015.07 16zm2.95-8H5.07a8.03 8.03 0 014.33-3.56A15.7 15.7 0 008.02 8zM12 19.96a15.4 15.4 0 01-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.36 14H9.64a14.5 14.5 0 010-4h4.72a14.5 14.5 0 010 4zm.28 5.56A15.7 15.7 0 0016.02 16h2.95a8.03 8.03 0 01-4.33 3.56zM16.36 14a16.5 16.5 0 000-4h3.38a8.1 8.1 0 010 4h-3.38z"
              />
            </svg>
          </button>
          <mat-menu #langMenu="matMenu">
            @for (lang of langs; track lang) {
              <button
                mat-menu-item
                type="button"
                class="lang-option"
                (click)="setLanguage(lang)"
                [attr.aria-current]="lang === currentLang()"
              >
                <span class="lang-option__check">
                  @if (lang === currentLang()) {
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                      <path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z" />
                    </svg>
                  }
                </span>
                <span>{{ langLabels[lang] }}</span>
              </button>
            }
          </mat-menu>

          <button
            mat-icon-button
            type="button"
            class="theme-toggle"
            [attr.aria-label]="isDarkMode() ? t('shell.themeToggle.toLight') : t('shell.themeToggle.toDark')"
            (click)="toggleTheme()"
          >
            @if (isDarkMode()) {
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                <path
                  d="M12 7a5 5 0 100 10 5 5 0 000-10zm0 8a3 3 0 110-6 3 3 0 010 6zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.51 4.93l1.41-1.41L6.34 4.93 4.93 6.34 3.51 4.93zm14.14 14.14l1.41-1.41 1.41 1.41-1.41 1.41-1.41-1.41zM4.93 17.66l1.41 1.41-1.41 1.41-1.41-1.41 1.41-1.41zM17.66 4.93l1.41-1.41 1.41 1.41-1.41 1.41-1.41-1.41zM1 11h3v2H1v-2zm19 0h3v2h-3v-2z"
                />
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                <path d="M12.3 3a9 9 0 108.7 13.3A9.3 9.3 0 0112.3 3z" />
              </svg>
            }
          </button>
        </div>
      </div>
    </header>

    <div class="shell__body">
      <main class="shell__main" id="main-content">
        <router-outlet />
      </main>
    </div>

    <footer class="shell__footer">
      <p>&copy; 2026 Reelio</p>
      <nav class="shell__footer-links">
        <a routerLink="/impressum">{{ t('shell.footer.impressum') }}</a>
        <a routerLink="/datenschutz">{{ t('shell.footer.privacy') }}</a>
        <a routerLink="/nutzungsbedingungen">{{ t('shell.footer.terms') }}</a>
      </nav>
    </footer>
  </div>
</ng-container>
