<a class="skip-link" href="#main-content">Zum Inhalt springen</a>

<div class="shell">
  <header class="shell__header">
    <div class="shell__header-inner">
      <div class="brand">
        <svg class="brand__mark" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <rect width="24" height="24" rx="6" fill="var(--mat-sys-primary)" />
          <path
            d="M12 6v8m0 0-3.5-3.5M12 14l3.5-3.5M6 17.5h12"
            stroke="var(--mat-sys-on-primary)"
            stroke-width="1.6"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="brand__name">Amapin</span>
      </div>

      <button
        mat-icon-button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="isDarkMode() ? 'Zu hellem Design wechseln' : 'Zu dunklem Design wechseln'"
        (click)="toggleTheme()"
      >
        @if (isDarkMode()) {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path
              d="M12 7a5 5 0 100 10 5 5 0 000-10zm0 8a3 3 0 110-6 3 3 0 010 6zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.51 4.93l1.41-1.41L6.34 4.93 4.93 6.34 3.51 4.93zm14.14 14.14l1.41-1.41 1.41 1.41-1.41 1.41-1.41-1.41zM4.93 17.66l1.41 1.41-1.41 1.41-1.41-1.41 1.41-1.41zM17.66 4.93l1.41-1.41 1.41 1.41-1.41 1.41-1.41-1.41zM1 11h3v2H1v-2zm19 0h3v2h-3v-2z"
            />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M12.3 3a9 9 0 108.7 13.3A9.3 9.3 0 0112.3 3z" />
          </svg>
        }
      </button>
    </div>
  </header>

  <app-ad-slot variant="top" />

  <div class="shell__body">
    <main class="shell__main" id="main-content">
      <router-outlet />
    </main>

    <app-ad-slot variant="sidebar" />
  </div>

  <app-ad-slot variant="bottom" />

  <footer class="shell__footer">
    <p>&copy; 2026 Amapin</p>
    <nav class="shell__footer-links">
      <a routerLink="/datenschutz">Datenschutz</a>
      <button type="button" class="shell__footer-link-button" (click)="consent.reopenBanner()">
        Cookie-Einstellungen
      </button>
    </nav>
  </footer>
</div>

<app-consent-banner />
