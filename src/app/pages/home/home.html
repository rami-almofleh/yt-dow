<section class="home">
  <h1>Amapin</h1>
  <p>Videos von YouTube, Facebook, Instagram und TikTok herunterladen – als Desktop-App.</p>

  <a mat-flat-button color="primary" class="home__primary-download" [href]="downloadLinks[primary.os]">
    Für {{ primary.label }} herunterladen
  </a>

  <p class="home__alt-platforms">
    Anderes Betriebssystem:
    @for (platform of others; track platform.os) {
      <a [href]="downloadLinks[platform.os]">{{ platform.label }}</a>
    }
  </p>
</section>
